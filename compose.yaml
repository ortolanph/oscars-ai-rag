services:
  redis:
    image: 'redis/redis-stack:latest'
    container_name: oscars-redis
    labels:
      - "org.springframework.boot.service-connection=redis"
    ports:
      - "6379:6379"   # Redis protocol
      - "8001:8001"   # RedisInsight (built-in UI, bonus)
    volumes:
      - redis_data:/data
    networks:
      - oscars-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: ocars-redis-commander
    ports:
      - "8082:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    networks:
      - oscars-net
    depends_on:
      redis:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: oscars-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yaml:/etc/prometheus/prometheus.yml
    networks:
      - oscars-net

  grafana:
    image: grafana/grafana-oss:latest
    container_name: oscars-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./config/grafana/provisioning/datasources/prometheus.yaml:/etc/grafana/provisioning/datasources/prometheus.yaml:ro
      - ./config/grafana/provisioning/dashboards/dashboards.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./config/grafana/provisioning/dashboards/oscars-ai-metrics.json:/etc/grafana/provisioning/dashboards/oscars-ai-metrics.json:ro
    networks:
      - oscars-net

volumes:
  redis_data:
  grafana-data:

networks:
  oscars-net:
