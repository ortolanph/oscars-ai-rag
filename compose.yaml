services:
  redis:
    image: 'redis/redis-stack:latest'
    container_name: oscars-redis
    labels:
      - "org.springframework.boot.service-connection=redis"
    ports:
      - "6379:6379"   # Redis protocol
      - "8001:8001"   # RedisInsight (built-in UI, bonus)
    volumes:
      - redis_data:/data
    networks:
      - oscars-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: ocars-redis-commander
    ports:
      - "8082:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    networks:
      - oscars-net
    depends_on:
      redis:
        condition: service_healthy

